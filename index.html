<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoBanana 生成介面 (Firebase)</title>
    <!-- 引入 Tailwind CSS --><script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 應用使用者偏好的字體 */
        body {
            font-family: 'Microsoft JhengHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 主應用程式容器的流暢過渡 */
        #app-container {
            transition: justify-content 0.5s ease-in-out;
        }

        /* 自動增高的 textarea，並有流暢的高度過渡 */
        #prompt-textarea {
            transition: height 0.2s ease-in-out;
            scrollbar-width: none; /* Firefox */
        }
        #prompt-textarea::-webkit-scrollbar {
            display: none; /* Chrome, Safari */
        }

        /* 圖片庫的淡入淡出效果 */
        .image-transition {
            transition: opacity 0.3s ease-in-out;
        }

        /* 進度條的流暢過渡 */
        #progress-bar {
            transition: width 0.3s ease-in-out;
        }
        
        /* 隱藏數字輸入框的上下箭頭 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
          -webkit-appearance: none; 
          margin: 0; 
        }
        input[type=number] {
          -moz-appearance: textfield;
        }

        /* 自定義切換開關 */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 28px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #4B5563; /* gray-600 */
            -webkit-transition: .4s;
            transition: .4s;
            border-radius: 28px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            -webkit-transition: .4s;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #3B82F6; /* blue-500 */
        }

        input:focus + .slider {
            box-shadow: 0 0 1px #3B82F6;
        }

        input:checked + .slider:before {
            -webkit-transform: translateX(20px);
            -ms-transform: translateX(20px);
            transform: translateX(20px);
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 h-screen overflow-hidden flex items-center justify-center">

    <!-- 1. 主應用程式容器 --><div id="app-container" class="w-full max-w-2xl h-full flex flex-col items-center justify-center p-4">

        <!-- 2. 生成結果區域 (預設隱藏) --><div id="results-gallery" class="w-full mb-8 hidden">
            <!-- 圖片顯示框 --><div id="image-display-wrapper" class="relative w-full aspect-square bg-gray-800 rounded-2xl shadow-xl overflow-hidden group">
                <img id="result-image" src="" alt="生成的圖片" class="w-full h-full object-contain image-transition opacity-0">

                <!-- 圖片上的按鈕 --><div class="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                    <!-- 下載按鈕 --><button id="download-btn" class="bg-black/50 text-white rounded-full p-2 hover:bg-black/75 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    </button>
                    <!-- 全螢幕預覽按鈕 --><button id="fullscreen-btn" class="bg-black/50 text-white rounded-full p-2 hover:bg-black/75 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                    </button>
                </div>
            </div>
            <!-- 圖片導航 --><div id="gallery-nav" class="flex justify-between items-center mt-4 px-2 hidden">
                <button id="nav-left" class="p-2 rounded-full hover:bg-gray-800 transition disabled:opacity-30 disabled:cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <span id="image-counter" class="text-sm text-gray-400"></span>
                <button id="nav-right" class="p-2 rounded-full hover:bg-gray-800 transition disabled:opacity-30 disabled:cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </div>
        </div>
        
        <!-- 3. 進度條區域 (預設隱藏) --><div id="progress-container" class="w-full px-2 my-10 hidden">
            <div class="w-full bg-gray-700 rounded-full h-2.5">
                <div id="progress-bar" class="bg-blue-500 h-2.5 rounded-full" style="width: 0%"></div>
            </div>
            <p id="progress-percent" class="text-center text-sm text-gray-400 mt-2">生成中... 0%</p>
            <p id="error-message" class="text-center text-red-400 mt-2 hidden"></p>
        </div>

        <!-- 4. 輸入框核心 --><div id="input-hub" class="w-full mt-auto">
            <!-- 圖片預覽 (上傳後顯示) --><div id="image-preview-container" class="flex gap-2 mb-2 ml-14 hidden">
                <!-- 圖片預覽 1 (主圖/放大/試穿衣物) --><div id="image-preview-wrapper-1" class="relative w-20 h-20 hidden">
                    <img id="image-preview-1" src="" alt="圖片預覽 1" class="w-full h-full object-cover rounded-lg shadow-md">
                    <button data-preview-id="1" class="remove-image-btn absolute -top-2 -right-2 bg-red-600 text-white rounded-full h-6 w-6 flex items-center justify-center text-xs font-bold shadow hover:bg-red-700 transition">&times;</button>
                </div>
                <!-- 圖片預覽 2 (虛擬試穿-人物) --><div id="image-preview-wrapper-2" class="relative w-20 h-20 hidden">
                    <img id="image-preview-2" src="" alt="圖片預覽 2" class="w-full h-full object-cover rounded-lg shadow-md">
                    <button data-preview-id="2" class="remove-image-btn absolute -top-2 -right-2 bg-red-600 text-white rounded-full h-6 w-6 flex items-center justify-center text-xs font-bold shadow hover:bg-red-700 transition">&times;</button>
                </div>
            </div>
            
            <!-- 主輸入框 --><div class="w-full bg-gray-800 border border-gray-700 rounded-2xl shadow-lg flex items-start p-2 gap-2">
                <!-- 左側按鈕 --><button id="upload-btn-1" class="flex-shrink-0 p-3 rounded-full hover:bg-gray-700 transition" title="上傳圖片 (主圖)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <input type="file" id="image-upload-1" accept="image/png, image/jpeg, image/webp" class="hidden">

                <!-- 虛擬試穿 - 人物上傳按鈕 (預設隱藏) --><button id="upload-btn-2" class="flex-shrink-0 p-3 rounded-full hover:bg-gray-700 transition hidden" title="上傳人物照片 (試穿用)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="17" y1="11" x2="23" y2="11"></line></svg>
                </button>
                <input type="file" id="image-upload-2" accept="image/png, image/jpeg, image/webp" class="hidden">
                
                <!-- 設定按鈕 --><button id="settings-btn" class="flex-shrink-0 p-3 rounded-full hover:bg-gray-700 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>

                <!-- 自動增高輸入框 --><textarea id="prompt-textarea" rows="1" placeholder="輸入提示詞..." class="flex-grow bg-transparent text-lg text-gray-100 placeholder-gray-500 p-3 resize-none outline-none overflow-y-auto" style="max-height: 200px;"></textarea>
                
                <!-- 發送按鈕 --><button id="send-btn" class="flex-shrink-0 bg-blue-600 text-white rounded-full p-3 hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </div>
        </div>

    </div>

    <!-- 5. 全螢幕預覽 Modal (預設隱藏) --><div id="fullscreen-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4 hidden transition-opacity">
        <div class="relative w-full h-full max-w-4xl max-h-[90vh] flex items-center justify-center">
            <!-- 關閉按鈕 --><button id="modal-close-btn" class="absolute -top-2 -right-2 md:top-2 md:right-2 z-10 bg-white text-black rounded-full p-1.5 shadow-lg hover:scale-110 transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <!-- 下載按鈕 --><button id="modal-download-btn" class="absolute top-2 left-2 z-10 bg-white/80 text-black rounded-full p-2 shadow-lg hover:bg-white transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            </button>

            <!-- Modal 圖片 --><img id="modal-image" src="" alt="全螢幕預覽" class="max-w-full max-h-full object-contain rounded-lg">
            
            <!-- Modal 導航 --><button id="modal-nav-left" class="absolute left-0 md:-left-12 p-2 rounded-full bg-white/30 hover:bg-white/50 transition disabled:opacity-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <button id="modal-nav-right" class="absolute right-0 md:-right-12 p-2 rounded-full bg-white/30 hover:bg-white/50 transition disabled:opacity-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </div>
    </div>
    
    <!-- 6. 設定 Modal (預設隱藏) --><div id="settings-modal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 hidden">
        <div class="bg-gray-800 rounded-2xl shadow-xl p-6 w-full max-w-sm">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">設定</h2>
                <button id="settings-close-btn" class="p-1 rounded-full hover:bg-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="mb-4">
                <label for="image-count" class="block text-sm font-medium text-gray-300 mb-2">生成圖片數量 (1-4)</label>
                <input type="number" id="image-count" name="image-count" value="1" min="1" max="4" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 text-white outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- 圖片放大 --><div class="flex justify-between items-center mb-4">
                <label for="upscaling-toggle" class="block text-sm font-medium text-gray-300">圖片放大 (Upscaling)</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="upscaling-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <!-- 虛擬試穿 --><div class="flex justify-between items-center">
                <label for="virtual-try-on-toggle" class="block text-sm font-medium text-gray-300">虛擬試穿 (Virtual Try-On)</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="virtual-try-on-toggle">
                    <span class="slider"></span>
                </label>
            </div>
            
            <p class="text-xs text-gray-500 mt-4">注意：特殊功能開啟時，只會生成一張圖片。</p>
        </div>
    </div>


    <script>
        // --- API 相關 ---
        // !!! 重要：將這裡替換成您部署後的 Firebase Function URL !!!
        const firebaseFunctionUrl = "https://us-central1-us-computer-474205.cloudfunctions.net/vertexImageGenerator"; 
        // 範例: "https://us-central1-us-computer-474205.cloudfunctions.net/vertexImageGenerator"

        // --- 狀態變數 ---
        let uploadedImage = null; // 儲存上傳圖片 1 的 Base64 和 MimeType
        let uploadedGament = null; // 儲存上傳圖片 2 (試穿用人物) 的 Base64 和 MimeType
        let generatedImages = []; // 儲存生成圖片 URL 的陣列
        let currentImageIndex = 0;
        let isLoading = false;
        let progressInterval = null;
        let isUpscalingEnabled = false;
        let isVirtualTryOnEnabled = false;

        // --- DOM 元素 ---
        const appContainer = document.getElementById('app-container');
        const inputHub = document.getElementById('input-hub');
        const promptTextarea = document.getElementById('prompt-textarea');
        const sendBtn = document.getElementById('send-btn');
        
        // 上傳
        const uploadBtn1 = document.getElementById('upload-btn-1');
        const imageUpload1 = document.getElementById('image-upload-1');
        const uploadBtn2 = document.getElementById('upload-btn-2');
        const imageUpload2 = document.getElementById('image-upload-2');
        
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreviewWrapper1 = document.getElementById('image-preview-wrapper-1');
        const imagePreview1 = document.getElementById('image-preview-1');
        const imagePreviewWrapper2 = document.getElementById('image-preview-wrapper-2');
        const imagePreview2 = document.getElementById('image-preview-2');
        const removeImageBtns = document.querySelectorAll('.remove-image-btn');

        // 進度條
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const errorMessage = document.getElementById('error-message');

        // 結果
        const resultsGallery = document.getElementById('results-gallery');
        const resultImage = document.getElementById('result-image');
        const downloadBtn = document.getElementById('download-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        
        // 圖片導航
        const galleryNav = document.getElementById('gallery-nav');
        const navLeft = document.getElementById('nav-left');
        const navRight = document.getElementById('nav-right');
        const imageCounter = document.getElementById('image-counter');

        // 全螢幕 Modal
        const fullscreenModal = document.getElementById('fullscreen-modal');
        const modalImage = document.getElementById('modal-image');
        const modalCloseBtn = document.getElementById('modal-close-btn');
        const modalDownloadBtn = document.getElementById('modal-download-btn');
        const modalNavLeft = document.getElementById('modal-nav-left');
        const modalNavRight = document.getElementById('modal-nav-right');
        
        // 設定 Modal
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const settingsCloseBtn = document.getElementById('settings-close-btn');
        const imageCountInput = document.getElementById('image-count');
        const upscalingToggle = document.getElementById('upscaling-toggle');
        const virtualTryOnToggle = document.getElementById('virtual-try-on-toggle');

        // --- 事件監聽 ---

        // 1. 文字框自動增高
        promptTextarea.addEventListener('input', () => {
            promptTextarea.style.height = 'auto'; // 先重設
            promptTextarea.style.height = `${promptTextarea.scrollHeight}px`;
        });

        // 2. 上傳圖片
        uploadBtn1.addEventListener('click', () => imageUpload1.click());
        uploadBtn2.addEventListener('click', () => imageUpload2.click());
        imageUpload1.addEventListener('change', (e) => handleImageUpload(e, 1));
        imageUpload2.addEventListener('change', (e) => handleImageUpload(e, 2));

        // 3. 移除預覽圖片
        removeImageBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = e.currentTarget.dataset.previewId;
                if (id === '1') {
                    uploadedImage = null;
                    imagePreview1.src = "";
                    imagePreviewWrapper1.classList.add('hidden');
                } else if (id === '2') {
                    uploadedGament = null;
                    imagePreview2.src = "";
                    imagePreviewWrapper2.classList.add('hidden');
                }
                
                // 檢查是否所有預覽都隱藏了
                if (imagePreviewWrapper1.classList.contains('hidden') && imagePreviewWrapper2.classList.contains('hidden')) {
                    imagePreviewContainer.classList.add('hidden');
                }
            });
        });

        // 4. 發送請求
        sendBtn.addEventListener('click', handleGeneration);
        promptTextarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleGeneration();
            }
        });

        // 5. 設定 Modal 開啟/關閉
        settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
        settingsCloseBtn.addEventListener('click', () => settingsModal.classList.add('hidden'));

        // 6. 設定選項變更
        upscalingToggle.addEventListener('change', (e) => {
            isUpscalingEnabled = e.target.checked;
            if (isUpscalingEnabled) {
                isVirtualTryOnEnabled = false;
                virtualTryOnToggle.checked = false;
            }
            updateInputUI();
        });
        virtualTryOnToggle.addEventListener('change', (e) => {
            isVirtualTryOnEnabled = e.target.checked;
            if (isVirtualTryOnEnabled) {
                isUpscalingEnabled = false;
                upscalingToggle.checked = false;
            }
            updateInputUI();
        });

        // 7. 圖片導航 (主介面)
        navLeft.addEventListener('click', () => showImage(currentImageIndex - 1));
        navRight.addEventListener('click', () => showImage(currentImageIndex + 1));
        
        // 8. 全螢幕 Modal 開啟/關閉/導航
        fullscreenBtn.addEventListener('click', openFullscreen);
        modalCloseBtn.addEventListener('click', closeFullscreen);
        modalNavLeft.addEventListener('click', () => showModalImage(currentImageIndex - 1));
        modalNavRight.addEventListener('click', () => showModalImage(currentImageIndex + 1));

        // 9. 下載
        downloadBtn.addEventListener('click', downloadCurrentImage);
        modalDownloadBtn.addEventListener('click', downloadCurrentImage);


        // --- 核心函式 ---

        /**
         * 根據設定更新輸入介面
         */
        function updateInputUI() {
            if (isVirtualTryOnEnabled) {
                uploadBtn1.title = "上傳衣物照片";
                uploadBtn2.classList.remove('hidden');
                imageCountInput.disabled = true;
                imageCountInput.value = 1;
            } else if (isUpscalingEnabled) {
                uploadBtn1.title = "上傳圖片 (主圖)";
                uploadBtn2.classList.add('hidden');
                imageCountInput.disabled = true;
                imageCountInput.value = 1;
            } else {
                uploadBtn1.title = "上傳圖片 (主圖)";
                uploadBtn2.classList.add('hidden');
                imageCountInput.disabled = false;
            }
        }

        /**
         * 處理圖片上傳
         * @param {Event} e - change 事件物件
         * @param {number} id - 圖片 ID (1 或 2)
         */
        async function handleImageUpload(e, id) {
            const file = e.target.files[0];
            if (!file) return;

            try {
                const { base64Data, mimeType, previewUrl } = await imageToBase64(file);
                
                if (id === 1) {
                    uploadedImage = { base64Data, mimeType, filename: file.name };
                    imagePreview1.src = previewUrl;
                    imagePreviewWrapper1.classList.remove('hidden');
                } else if (id === 2) {
                    uploadedGament = { base64Data, mimeType, filename: file.name };
                    imagePreview2.src = previewUrl;
                    imagePreviewWrapper2.classList.remove('hidden');
                }
                
                imagePreviewContainer.classList.remove('hidden');
                e.target.value = null; // 清空以便下次上傳
            } catch (error) {
                console.error("圖片讀取錯誤:", error);
                showError("讀取圖片失敗。");
            }
        }

        /**
         * 主生成函式 (呼叫 Firebase Function)
         */
        async function handleGeneration() {
            if (isLoading) return;

            if (firebaseFunctionUrl === "YOUR_FIREBASE_FUNCTION_URL_HERE") {
                showError("錯誤：您尚未在 HTML 檔案中設定您的 Firebase Function URL！");
                return;
            }
            
            const prompt = promptTextarea.value.trim();
            const numImages = parseInt(imageCountInput.value) || 1;
            
            // 決定模式
            let mode = "generate";
            if (isUpscalingEnabled) mode = "upscale";
            if (isVirtualTryOnEnabled) mode = "tryon";

            // 基礎檢查
            if (mode === "generate" && !prompt && !uploadedImage) {
                showError("請至少輸入提示詞或上傳一張圖片。"); return;
            }
            if (mode === "upscale" && !uploadedImage) {
                showError("請上傳一張圖片來進行「圖片放大」。"); return;
            }
            if (mode === "tryon" && (!uploadedImage || !uploadedGament)) {
                showError("請上傳「衣物」和「人物」兩張圖片來進行「虛擬試穿」。"); return;
            }

            setLoading(true);
            await simulateProgress(0, 90, 2000); // 模擬 0-90% 進度

            try {
                // 建立傳送給 Firebase Function 的 Payload
                const payload = {
                    mode: mode,
                    prompt: prompt,
                    numImages: numImages,
                    image: uploadedImage,       // Base64 + mimeType
                    gament: uploadedGament, // Base64 + mimeType
                };

                // 呼叫我們的後端
                const result = await fetchWithBackoff(firebaseFunctionUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });
                
                // 後端應回傳 { images: ["data:...", "data:..."] }
                if (result.images && result.images.length > 0) {
                    generatedImages = result.images;
                } else {
                    throw new Error("後端未回傳任何圖片。");
                }

                await simulateProgress(90, 100, 300); // 模擬 90-100% 進度
                displayResults();

            } catch (error) {
                console.error("後端呼叫失敗:", error);
                showError(`呼叫失敗: ${error.message}`);
                setLoading(false);
            }
        }


        /**
         * 帶有指數退避重試機制的 fetch
         */
        async function fetchWithBackoff(url, options, retries = 3, delay = 1000) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    let errorData;
                    const errorText = await response.text(); // 先獲取純文字
                    try {
                        errorData = JSON.parse(errorText); // 嘗試解析 JSON 錯誤
                    } catch (e) {
                        // 不是 JSON 錯誤，使用純文字
                        throw new Error(`HTTP ${response.status}: ${response.statusText || 'Unknown Status'} - ${errorText || 'No error body'}`);
                    }
                    
                    // 從錯誤資料中提取更詳細的訊息
                    const message = errorData.error?.message || errorData.message || response.statusText || 'Unknown error';
                    if (!message || message.trim() === "") {
                        throw new Error(`HTTP ${response.status} - ${errorText}`);
                    }
                    throw new Error(message);
                }
                
                // 成功，解析 JSON
                return await response.json();

            } catch (error) {
                console.warn(`Fetch 失敗 (重試 ${retries} 次): ${error.message}`);
                if (retries > 0) {
                    await new Promise(resolve => setTimeout(resolve, delay));
                    // 增加下次重試的延遲
                    return fetchWithBackoff(url, options, retries - 1, delay * 2);
                } else {
                    // 拋出最終錯誤
                    throw error;
                }
            }
        }

        /**
         * 將圖片檔案轉為 Base64 (用於預覽和 API)
         */
        function imageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    const previewUrl = reader.result;
                    // 從 data URL 中分離 MimeType 和 Base64 data
                    const base64String = previewUrl.split(',')[1];
                    const mimeType = previewUrl.split(',')[0].split(':')[1].split(';')[0];
                    resolve({ 
                        base64Data: base64String, 
                        mimeType: mimeType, 
                        previewUrl: previewUrl 
                    });
                };
                reader.onerror = error => reject(error);
            });
        }

        /**
         * 顯示結果
         */
        function displayResults() {
            if (generatedImages.length > 0) {
                currentImageIndex = 0;
                showImage(currentImageIndex);
                resultsGallery.classList.remove('hidden');
                
                // 設定導航
                if (generatedImages.length > 1) {
                    galleryNav.classList.remove('hidden');
                } else {
                    galleryNav.classList.add('hidden');
                }
            } else {
                showError("未生成任何圖片。");
            }
            setLoading(false);
        }

        /**
         * 在主介面顯示指定索引的圖片
         */
        function showImage(index) {
            if (index < 0 || index >= generatedImages.length) {
                return;
            }
            currentImageIndex = index;
            resultImage.classList.add('opacity-0');
            
            // 延遲一點時間讓淡出效果先生效
            setTimeout(() => {
                resultImage.src = generatedImages[currentImageIndex];
                modalImage.src = generatedImages[currentImageIndex]; // 同時更新 modal
                resultImage.classList.remove('opacity-0');
            }, 150);

            // 更新計數器
            imageCounter.textContent = `${index + 1} / ${generatedImages.length}`;
            
            // 更新按鈕狀態
            navLeft.disabled = index === 0;
            navRight.disabled = index === (generatedImages.length - 1);
            modalNavLeft.disabled = index === 0;
            modalNavRight.disabled = index === (generatedImages.length - 1);
        }

        /**
         * 在全螢幕 Modal 中顯示圖片
         */
        function showModalImage(index) {
            // 邏輯與 showImage 相同，只是目標是 modalImage
            if (index < 0 || index >= generatedImages.length) {
                return;
            }
            currentImageIndex = index;
            modalImage.classList.add('opacity-0');
            
            setTimeout(() => {
                modalImage.src = generatedImages[currentImageIndex];
                resultImage.src = generatedImages[currentImageIndex]; // 同時更新主介面
                modalImage.classList.remove('opacity-0');
            }, 150);

            // 更新計數器
            imageCounter.textContent = `${index + 1} / ${generatedImages.length}`;
            
            // 更新按鈕狀態
            navLeft.disabled = index === 0;
            navRight.disabled = index === (generatedImages.length - 1);
            modalNavLeft.disabled = index === 0;
            modalNavRight.disabled = index === (generatedImages.length - 1);
        }

        /**
         * 開啟全螢幕
         */
        function openFullscreen() {
            showModalImage(currentImageIndex); // 確保 modal 顯示的是當前圖片
            fullscreenModal.classList.remove('hidden');
            fullscreenModal.classList.add('flex');
        }

        /**
         * 關閉全螢幕
         */
        function closeFullscreen() {
            fullscreenModal.classList.add('hidden');
            fullscreenModal.classList.remove('flex');
            showImage(currentImageIndex); // 確保主介面同步
        }

        /**
         * 下載當前圖片 (相容性最佳化)
         */
        async function downloadCurrentImage() {
            try {
                const imageUrl = generatedImages[currentImageIndex];
                
                // Base64 Data URL (data:image/png;base64,...)
                const response = await fetch(imageUrl);
                const blob = await response.blob();
                
                // 創建一個隱藏的 <a> 標籤來觸發下載
                const a = document.createElement('a');
                const url = URL.createObjectURL(blob);
                
                a.href = url;
                // 確保檔案名稱有副檔名
                const extension = blob.type.split('/')[1] || 'png';
                a.download = `generated-image-${Date.now()}.${extension}`;
                
                document.body.appendChild(a);
                a.click();
                
                // 清理
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

            } catch (error) {
                console.error("下載失敗:", error);
                showError("圖片下載失敗。");
            }
        }


        /**
         * 設定載入狀態
         */
        function setLoading(state) {
            isLoading = state;
            sendBtn.disabled = state;
            if (state) {
                // 狀態: 載入中
                appContainer.style.justifyContent = 'flex-start'; // 上移
                inputHub.classList.add('mt-auto'); // 推到底部
                resultsGallery.classList.add('hidden'); // 隱藏舊結果
                progressContainer.classList.remove('hidden');
                errorMessage.classList.add('hidden');
                sendBtn.innerHTML = '<svg class="animate-spin h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
            } else {
                // 狀態: 非載入中
                clearInterval(progressInterval);
                if (!resultsGallery.classList.contains('hidden')) {
                    // 如果有結果，保持在上
                    appContainer.style.justifyContent = 'flex-start';
                } else {
                    // 如果沒結果 (或失敗)，回到中央
                    appContainer.style.justifyContent = 'center';
                    inputHub.classList.remove('mt-auto');
                }
                progressContainer.classList.add('hidden');
                sendBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>';
            }
        }

        /**
         * 模擬進度條
         */
        function simulateProgress(start, end, duration) {
            return new Promise(resolve => {
                clearInterval(progressInterval);
                let current = start;
                const step = (end - start) / (duration / 50); // 每 50ms 更新一次
                
                progressInterval = setInterval(() => {
                    current += step;
                    if (current >= end) {
                        current = end;
                        clearInterval(progressInterval);
                        resolve();
                    }
                    progressBar.style.width = `${Math.floor(current)}%`;
                    progressPercent.textContent = `生成中... ${Math.floor(current)}%`;
                }, 50);
            });
        }

        /**
         * 顯示錯誤訊息
         */
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden');
            progressContainer.classList.remove('hidden'); // 確保錯誤訊息可見
            progressBar.style.width = '0%'; // 重設進度條
            progressPercent.textContent = "失敗";
        }
    </script>
</body>
